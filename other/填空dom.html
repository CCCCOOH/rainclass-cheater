<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填空题 - DOM核心结构</title>
    <style>
        /* 模拟Element UI样式，仅用于展示结构 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .exam-main--content { max-width: 900px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 20px; }
        .subject-item { border-bottom: 1px solid #ebeef5; padding: 20px 0; }
        .subject-item:last-child { border-bottom: none; }
        .exercise-item { position: relative; }
        .item-type { font-weight: 600; color: #409EFF; margin-bottom: 12px; font-size: 14px; }
        .item-body { margin-bottom: 8px; }
        .exam-font { font-size: 14px; color: #606266; line-height: 1.8; }
        .blank-item-dynamic { 
            border: 1px solid #dcdfe6; 
            border-radius: 4px; 
            padding: 4px 12px; 
            margin: 0 4px; 
            min-width: 140px;
            height: 32px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .blank-item-dynamic:focus { border-color: #409EFF; }
        .ai-answer-btn { 
            position: absolute; 
            right: 10px; 
            top: 10px; 
            background: #409EFF; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            padding: 4px 16px; 
            font-size: 12px; 
            cursor: pointer; 
            z-index: 5; 
            box-shadow: 0 2px 6px rgba(64,158,255,0.3); 
            transition: 0.3s; 
        }
        .ai-answer-btn:hover { background: #66b1ff; transform: scale(1.05); }
        .ai-status-tooltip { 
            position: absolute; 
            right: 80px; 
            top: 12px; 
            font-size: 12px; 
            color: #F56C6C; 
            background: #fef0f0; 
            padding: 2px 12px; 
            border-radius: 12px; 
            z-index: 4; 
            white-space: nowrap; 
            border: 1px solid #fde2e2;
        }
        .clearfix::after { content: ""; display: table; clear: both; }
        /* 占位图标 */
        .el-icon-loading::before { content: "⏳"; margin-right: 4px; }
    </style>
</head>
<body>
    <div class="exam-main--content">
        <!-- ===== 第11题：填空题 ===== -->
        <div class="subject-item">
            <div data-v-682e95ae="" class="exercise-item" style="position: relative;">
                <!-- 题目头部：类型、分值 -->
                <div data-v-682e95ae="" class="item-type">
                    11.填空题
                    <span data-v-682e95ae="">(1分)</span>
                    <span data-v-682e95ae=""><!-- 状态占位，无内容 --></span>
                </div>

                <!-- 题目主体 -->
                <div data-v-682e95ae="" class="item-body">
                    <!-- 填空题文本 + 输入框 -->
                    <div data-v-682e95ae="" class="exam-font">
                        <span data-v-682e95ae="">LVS 集群采用的两大技术是</span>
                        <span data-v-682e95ae="">
                            <input data-v-682e95ae="" 
                                   placeholder="输入答案" 
                                   type="text" 
                                   class="blank-item-dynamic" 
                                   style="width: auto !important;">
                        </span>
                        <span data-v-682e95ae=""> 。</span>
                    </div>
                    <!-- 额外的空容器（占位） -->
                    <div data-v-682e95ae="" class="exam-font"><!-- 空 --></div>
                </div>

                <!-- AI答题按钮 + 状态提示 -->
                <button class="ai-answer-btn" title="点击AI答题 (填空)">AI</button>
                <div class="ai-status-tooltip">❌ 未找到题目</div>
            </div>
        </div>
    </div>
</body>
</html>
